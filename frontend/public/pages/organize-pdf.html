<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organize PDF - PlusConversion</title>
    <meta name="description" content="Rearrange, delete, and rotate PDF pages in a unified, interactive visual workspace. 100% free and private online PDF organizer.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../styles/style.css">
    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- pdf-lib library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <!-- SortableJS library -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>

    <div id="navbar-container"></div>

    <main class="tool-main">
        <div class="tool-header">
            <h1 class="tool-title">Organize PDF</h1>
            <p class="tool-subtitle">Rearrange, rotate, or delete specific pages in your document. Drag to sort, click buttons to rotate/delete.</p>
        </div>

        <div class="tool-workspace">
            <div id="dropzone-container"></div>
            <div id="page-sorter-container" class="page-sorter-container"></div>
            <div id="progress-container"></div>
            <div id="result-container"></div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script type="module" src="../js/pages/organize-pdf.js"></script>
</body>
</html>
